<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Acesso Industrial</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
            padding: 2rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.75rem;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font-size: 0.95rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-danger {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid var(--danger);
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid var(--success);
        }

        .credentials-box {
            background: #f0f4ff;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-top: 1.5rem;
            border-left: 4px solid var(--primary);
        }

        .credentials-box h3 {
            font-size: 0.875rem;
            color: var(--text);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .credentials-box p {
            font-size: 0.8rem;
            color: var(--text-light);
            margin: 0.25rem 0;
        }

        .credentials-box code {
            background: white;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: 'Courier New', monospace;
            color: var(--primary);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🔐 Controle de Acesso</h1>
                <p>Sistema Industrial BIO-T / Siemens</p>
            </div>

            <div id="alertContainer">
                <div id="errorAlert" class="alert alert-danger"></div>
                <div id="successAlert" class="alert alert-success"></div>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        autofocus
                        placeholder="Digite seu usuário"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        placeholder="Digite sua senha"
                    >
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    Entrar
                </button>
            </form>

            <div class="credentials-box">
                <h3>📋 Credenciais Padrão</h3>
                <p>Usuário: <code>admin</code></p>
                <p>Senha: <code>admin123</code></p>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Redirecionar se já está autenticado
        if (Auth.isAuthenticated()) {
            window.location.href = '/dashboard.html';
        }

        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            // Limpar alertas
            errorAlert.classList.remove('show');
            successAlert.classList.remove('show');

            // Desabilitar botão
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Entrando...';

            try {
                const response = await ApiClient.post('/auth/login', { username, password });

                // Salvar token e usuário
                Auth.setToken(response.token);
                Auth.setUser(response.user);

                // Mostrar sucesso
                successAlert.textContent = '✅ Login realizado com sucesso!';
                successAlert.classList.add('show');

                // Redirecionar após 1 segundo
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1000);
            } catch (error) {
                errorAlert.textContent = '❌ ' + (error.message || 'Erro ao fazer login');
                errorAlert.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        }
    </script>
</body>
</html>
